name: 🐍 Generate Snake

on:
  # Cada 12 horas
  schedule:
    - cron: "0 */12 * * *"
  # Ejecutar manualmente desde la pestaña Actions
  workflow_dispatch:
  # También al hacer push a main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Genera los SVG de la serpiente (claro y oscuro, colores synthwave)
      - uses: Platane/snk@v3
        with:
          github_user_name: Arquableactor
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#ff2e97
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#34e1ff

      # Publica los SVG en la rama "output"
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
